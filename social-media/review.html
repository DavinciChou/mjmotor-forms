<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自媒體素材審核 — 審核詳情</title>
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --primary: #3182ce; --primary-l: #ebf8ff;
      --success: #38a169; --danger: #e53e3e;
      --border: #e2e8f0; --bg: #f0f4f8;
      --card: #ffffff; --text: #2d3748; --sub: #718096;
      --radius: 12px; --shadow: 0 1px 4px rgba(0,0,0,.08);
    }
    body { font-family: 'Segoe UI','Microsoft JhengHei',sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }

    /* topbar */
    .topbar { background: #1a365d; color: #fff; padding: 0 24px; height: 48px; display: flex; align-items: center; gap: 12px; box-shadow: 0 2px 8px rgba(0,0,0,.18); }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub   { font-size: 12px; opacity: .7; }
    .topbar-spacer { flex: 1; }
    .user-badge   { font-size: 12px; opacity: .85; display: flex; align-items: center; gap: 5px; }

    /* layout */
    .page-wrap { max-width: 780px; margin: 20px auto; padding: 0 16px 48px; display: flex; flex-direction: column; gap: 12px; }

    /* card */
    .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; }
    .card-title { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .7px; margin-bottom: 12px; }

    /* ① header card */
    .header-card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 16px 20px; display: flex; align-items: center; justify-content: space-between; gap: 16px; }
    .header-id    { font-size: 11px; color: var(--sub); margin-bottom: 3px; }
    .header-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
    .header-meta  { font-size: 11.5px; color: var(--sub); display: flex; gap: 12px; flex-wrap: wrap; }
    .status-badge { display: inline-flex; align-items: center; gap: 5px; padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 700; white-space: nowrap; flex-shrink: 0; }
    .badge-approved { background: #c6f6d5; color: #276749; }
    .badge-rejected { background: #fed7d7; color: #c53030; }
    .badge-pending  { background: #fefcbf; color: #744210; }

    /* ② tracker */
    #r-tracker { padding: 4px 0 4px; }

    /* ③ 申請內容兩欄 */
    .info-two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .info-item { display: flex; flex-direction: column; gap: 3px; background: #f7fafc; border: 1px solid var(--border); border-radius: 8px; padding: 8px 12px; }
    .info-item.full { grid-column: 1 / -1; }
    .info-label { font-size: 10.5px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .3px; }
    .info-value { color: var(--text); font-size: 13px; word-break: break-word; }
    .info-value.caption { white-space: pre-wrap; font-size: 12.5px; line-height: 1.6; }

    /* ④ 附件三欄 */
    .media-three-col { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 20px; }
    .media-col-title { font-size: 11px; font-weight: 700; color: var(--sub); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 8px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    #r-photos { display: flex; flex-wrap: wrap; gap: 8px; }
    #r-videos { display: flex; flex-direction: column; gap: 8px; }
    #r-attachments { display: flex; flex-direction: column; gap: 6px; }

    @media (max-width: 580px) {
      .info-two-col { grid-template-columns: 1fr; }
      .media-three-col { grid-template-columns: 1fr; gap: 16px 0; }
      .header-card { flex-direction: column; align-items: flex-start; }
    }
  </style>
</head>
<body>

<header class="topbar">
  <div class="topbar-title">銘勁汽車</div>
  <div class="topbar-sub">自媒體素材審核 — 詳情</div>
  <div class="topbar-spacer"></div>
  <div class="user-badge">👤 <span id="user-display">載入中…</span></div>
</header>

<div class="page-wrap" id="main-content">

  <!-- ① Header -->
  <div class="header-card">
    <div style="flex:1;min-width:0;">
      <div class="header-id" id="r-header-id">—</div>
      <div class="header-title" id="r-header-title">—</div>
      <div class="header-meta" id="r-header-meta"></div>
    </div>
    <div class="status-badge badge-pending" id="r-header-status">載入中…</div>
  </div>

  <!-- ② 審核進度 -->
  <div class="card">
    <div class="card-title">審核進度</div>
    <div id="r-tracker"></div>
  </div>

  <!-- ③ 申請內容（兩欄） -->
  <div class="card">
    <div class="card-title">申請內容</div>
    <div class="info-two-col">
      <div class="info-item">
        <span class="info-label">貼文標題</span>
        <span class="info-value" id="r-title">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">申請人</span>
        <span class="info-value" id="r-applicant">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">據點</span>
        <span class="info-value" id="r-location">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">發布平台</span>
        <span class="info-value" id="r-platform">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">預計發布日</span>
        <span class="info-value" id="r-post-date">—</span>
      </div>
      <div class="info-item">
        <span class="info-label">送出時間</span>
        <span class="info-value" id="r-submitted-at">—</span>
      </div>
      <div class="info-item full">
        <span class="info-label">說明文字</span>
        <span class="info-value caption" id="r-caption">—</span>
      </div>
    </div>
  </div>

  <!-- ④ 附件素材（三欄） -->
  <div class="card">
    <div class="card-title">附件素材</div>
    <div class="media-three-col">
      <div>
        <div class="media-col-title">📷 照片</div>
        <div id="r-photos"><span style="color:var(--sub);font-size:12px;">（無）</span></div>
      </div>
      <div>
        <div class="media-col-title">🎬 影片</div>
        <div id="r-videos"><span style="color:var(--sub);font-size:12px;">（無）</span></div>
      </div>
      <div>
        <div class="media-col-title">📎 其他附件</div>
        <div id="r-attachments"><span style="color:var(--sub);font-size:12px;">（無）</span></div>
      </div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<script type="module" src="review.js?v=18"></script>
<script type="module">
  import { getCurrentUser } from '../shared/auth.js?v=12';
  const update = () => {
    const u = getCurrentUser();
    if (u) document.getElementById('user-display').textContent = u.name;
    else setTimeout(update, 500);
  };
  update();
</script>

</body>
</html>
