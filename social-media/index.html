<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自媒體素材審核申請 — 銘勁汽車</title>

  <!-- MSAL.js v2（CDN） -->
  <script src="https://alcdn.msauth.net/browser/2.38.3/js/msal-browser.min.js"></script>

  <!-- 全站樣式（可依需求抽出成 shared/style.css） -->
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:   #3182ce;
      --primary-l: #ebf8ff;
      --success:   #38a169;
      --danger:    #e53e3e;
      --warning:   #d69e2e;
      --border:    #e2e8f0;
      --bg:        #f7fafc;
      --text:      #2d3748;
      --sub:       #718096;
      --radius:    10px;
      --shadow:    0 2px 12px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── 頂部 Bar ── */
    .topbar {
      background: #1a365d;
      color: #fff;
      padding: 0 24px;
      height: 56px;
      display: flex;
      align-items: center;
      gap: 14px;
      box-shadow: 0 2px 8px rgba(0,0,0,.18);
    }
    .topbar img { height: 32px; }
    .topbar-title { font-size: 17px; font-weight: 700; letter-spacing: .5px; }
    .topbar-sub { font-size: 12px; opacity: .7; }
    .topbar-spacer { flex: 1; }
    .user-badge {
      font-size: 13px; opacity: .85;
      display: flex; align-items: center; gap: 6px;
    }

    /* ── 版面容器 ── */
    .page-wrap {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 16px 60px;
    }

    /* ── 卡片 ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 28px 32px;
      margin-bottom: 20px;
    }
    .card-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 18px;
      padding-bottom: 10px;
      border-bottom: 2px solid var(--primary-l);
    }

    /* ── 表單欄位 ── */
    .field-row { margin-bottom: 16px; }
    .field-row label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .field-row label .required { color: var(--danger); margin-left: 2px; }
    .field-row input,
    .field-row select,
    .field-row textarea {
      width: 100%;
      padding: 10px 12px;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 14px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      outline: none;
    }
    .field-row input:focus,
    .field-row select:focus,
    .field-row textarea:focus { border-color: var(--primary); }
    .field-row input[readonly],
    .field-row textarea[readonly] { background: #f7fafc; color: var(--sub); }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 0 20px; }
    @media (max-width: 540px) { .field-grid { grid-template-columns: 1fr; } }

    /* ── 審核人唯讀卡 ── */
    .reviewer-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 4px;
    }
    @media (max-width: 580px) { .reviewer-grid { grid-template-columns: 1fr; } }
    .reviewer-card {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 12px 14px;
    }
    .reviewer-card .role { font-size: 11px; color: var(--sub); font-weight: 600; margin-bottom: 4px; }
    .reviewer-card .name { font-size: 14px; font-weight: 700; }
    .reviewer-card .email { font-size: 11px; color: var(--sub); margin-top: 2px; word-break: break-all; }

    /* ── 媒體上傳 ── */
    .upload-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 16px;
      background: var(--primary-l);
      color: var(--primary);
      border: 1.5px dashed var(--primary);
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background .2s;
    }
    .upload-btn:hover { background: #bee3f8; }
    .file-list { display: flex; flex-direction: column; gap: 6px; margin-top: 10px; }

    /* ── 送出按鈕 ── */
    .submit-btn {
      width: 100%;
      padding: 14px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: background .2s;
      font-family: inherit;
    }
    .submit-btn:hover:not(:disabled) { background: #2c5282; }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── 確認畫面 ── */
    #confirm-section { display: none; }
    .confirm-box {
      text-align: center;
      padding: 40px 24px;
    }
    .confirm-icon { font-size: 56px; }
    .confirm-title { font-size: 22px; font-weight: 700; color: var(--success); margin-top: 14px; }
    .confirm-sub { font-size: 14px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
    .confirm-id {
      display: inline-block;
      margin-top: 14px;
      padding: 6px 18px;
      background: var(--primary-l);
      color: var(--primary);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    /* ── 隱藏 input ── */
    input[type=file] { display: none; }
  </style>
</head>
<body>

<!-- 頂部導覽列 -->
<header class="topbar">
  <div class="topbar-title">銘勁汽車</div>
  <div class="topbar-sub">自媒體素材審核申請</div>
  <div class="topbar-spacer"></div>
  <div class="user-badge">
    <span>👤</span>
    <span id="user-display">載入中…</span>
  </div>
</header>

<!-- ── 申請表單 ── -->
<div class="page-wrap">
  <div id="form-section">

    <!-- 申請人資訊 -->
    <div class="card">
      <div class="card-title">📋 申請人資訊</div>
      <div class="field-grid">
        <div class="field-row">
          <label>姓名</label>
          <input id="applicant-name" type="text" readonly placeholder="SSO 自動帶入" />
        </div>
        <div class="field-row">
          <label>Email</label>
          <input id="applicant-email" type="email" readonly placeholder="SSO 自動帶入" />
        </div>
      </div>
    </div>

    <!-- 貼文資訊 -->
    <div class="card">
      <div class="card-title">📣 貼文資訊</div>

      <div class="field-grid">
        <div class="field-row">
          <label for="location">據點 <span class="required">*</span></label>
          <select id="location">
            <option value="">請選擇據點</option>
            <option value="八德展示中心">八德展示中心</option>
            <option value="中壢展示中心">中壢展示中心</option>
            <option value="桃園展示中心">桃園展示中心</option>
          </select>
        </div>
        <div class="field-row">
          <label for="platform">發布平台 <span class="required">*</span></label>
          <select id="platform">
            <option value="">請選擇平台</option>
            <option value="Facebook">Facebook</option>
            <option value="Instagram">Instagram</option>
            <option value="LINE">LINE</option>
            <option value="YouTube">YouTube</option>
            <option value="其他">其他</option>
          </select>
        </div>
      </div>

      <div class="field-row">
        <label for="post-title">貼文標題 <span class="required">*</span></label>
        <input id="post-title" type="text" placeholder="請填寫貼文標題" maxlength="200" />
      </div>

      <div class="field-row">
        <label for="post-date">預計發布日期 <span class="required">*</span></label>
        <input id="post-date" type="date" />
      </div>

      <div class="field-row">
        <label for="caption">貼文說明文字</label>
        <textarea id="caption" rows="4" placeholder="貼文內容草稿（選填）"></textarea>
      </div>
    </div>

    <!-- 媒體上傳 -->
    <div class="card">
      <div class="card-title">🖼️ 媒體素材</div>

      <!-- 照片 -->
      <div class="field-row">
        <label>照片（最多 2 張，JPG / PNG / HEIC 等）</label>
        <label class="upload-btn" for="photo-input">
          ＋ 選擇照片
        </label>
        <input id="photo-input" type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.heic,.heif" multiple />
        <div id="photo-list" class="file-list"></div>
      </div>

      <!-- 影片 -->
      <div class="field-row">
        <label>影片（最多 1 支，MP4 / MOV 等，建議 ≤ 500 MB）</label>
        <label class="upload-btn" for="video-input">
          ＋ 選擇影片
        </label>
        <input id="video-input" type="file" accept=".mp4,.mov,.avi,.mkv,.webm" />
        <div id="video-list" class="file-list"></div>
      </div>

      <!-- 附件 -->
      <div class="field-row">
        <label>其他附件（最多 3 個，PDF / Word / Excel 等）</label>
        <label class="upload-btn" for="attach-input">
          ＋ 選擇附件
        </label>
        <input id="attach-input" type="file"
          accept=".pdf,.docx,.xlsx,.pptx,.zip,.txt"
          multiple />
        <div id="attach-list" class="file-list"></div>
      </div>
    </div>

    <!-- 審核人（路由表自動帶入，唯讀） -->
    <div class="card">
      <div class="card-title">👥 審核人員（系統自動帶入）</div>
      <div class="reviewer-grid">
        <div class="reviewer-card">
          <div class="role">第二關 — 所長</div>
          <div class="name" id="reviewer2-name">—</div>
          <div class="email" id="reviewer2-email">尚未選擇據點</div>
        </div>
        <div class="reviewer-card">
          <div class="role">第三關 — 行銷</div>
          <div class="name" id="reviewer3-name">—</div>
          <div class="email" id="reviewer3-email">尚未選擇據點</div>
        </div>
        <div class="reviewer-card">
          <div class="role">第四關 — 部長</div>
          <div class="name" id="reviewer4-name">—</div>
          <div class="email" id="reviewer4-email">尚未選擇據點</div>
        </div>
      </div>
      <!-- 隱藏欄位：供 form.js 讀取 -->
      <input type="hidden" id="reviewer2-name-val" />
      <input type="hidden" id="reviewer2-email-val" />
      <input type="hidden" id="reviewer3-name-val" />
      <input type="hidden" id="reviewer3-email-val" />
      <input type="hidden" id="reviewer4-name-val" />
      <input type="hidden" id="reviewer4-email-val" />
    </div>

    <!-- 送出 -->
    <button id="submit-btn" class="submit-btn">送出申請</button>

  </div><!-- /#form-section -->

  <!-- ── 確認畫面 ── -->
  <div id="confirm-section">
    <div class="card">
      <div class="confirm-box">
        <div class="confirm-icon">🎉</div>
        <div class="confirm-title">申請已送出！</div>
        <div class="confirm-sub">
          表單已成功提交，審核人員將收到通知。<br />
          您可以在下方追蹤審核進度。
        </div>
        <div class="confirm-id">申請編號 <span id="confirm-item-id">—</span></div>
      </div>

      <!-- 四階段進度條 -->
      <div class="card-title" style="margin-top:8px;">審核進度</div>
      <div id="confirm-tracker"></div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<!-- form.js（ES module） -->
<script type="module" src="form.js"></script>

<!-- 同步更新 topbar 使用者名稱（auth.js 初始化後觸發） -->
<script type="module">
  // form.js 完成 loginIfNeeded() 後，getCurrentUser 才能使用
  // 這裡用一個簡單的 polling 更新 UI（形式上不需要複雜機制）
  import { getCurrentUser } from '../shared/auth.js';
  const update = () => {
    const u = getCurrentUser();
    if (u) document.getElementById('user-display').textContent = u.name;
    else setTimeout(update, 500);
  };
  update();
</script>

</body>
</html>
