<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>自媒體素材審核申請 — 銘勁汽車</title>

  <!-- MSAL.js v2（CDN） -->
  <script src="https://cdn.jsdelivr.net/npm/@azure/msal-browser@2.38.3/lib/msal-browser.min.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary:     #3182ce;
      --primary-l:   #ebf8ff;
      --primary-d:   #2c5282;
      --success:     #38a169;
      --danger:      #e53e3e;
      --border:      #e2e8f0;
      --bg:          #f0f4f8;
      --text:        #2d3748;
      --sub:         #718096;
      --auto-bg:     #edf7ff;
      --auto-border: #90cdf4;
      --auto-text:   #2b6cb0;
      --radius:      8px;
      --shadow:      0 1px 6px rgba(0,0,0,.08);
    }

    body {
      font-family: 'Segoe UI', 'Microsoft JhengHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 14px;
      min-height: 100vh;
    }

    /* ── 頂部 Bar ── */
    .topbar {
      background: #1a365d;
      color: #fff;
      padding: 0 20px;
      height: 48px;
      display: flex;
      align-items: center;
      gap: 12px;
      box-shadow: 0 2px 6px rgba(0,0,0,.2);
    }
    .topbar-title { font-size: 16px; font-weight: 700; }
    .topbar-sub   { font-size: 11px; opacity: .65; }
    .topbar-spacer { flex: 1; }
    .user-badge { font-size: 12px; opacity: .85; display: flex; align-items: center; gap: 5px; }

    /* ── 版面 ── */
    .page-wrap {
      max-width: 680px;
      margin: 14px auto;
      padding: 0 12px 40px;
    }

    /* ── 卡片 ── */
    .card {
      background: #fff;
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px 18px;
      margin-bottom: 10px;
    }
    .card-title {
      font-size: 13px;
      font-weight: 700;
      color: var(--primary);
      margin-bottom: 12px;
      padding-bottom: 7px;
      border-bottom: 2px solid var(--primary-l);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .card-title .note { font-size: 10px; color: var(--sub); font-weight: 400; }

    /* ── Grid ── */
    .grid-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0 14px; }
    .grid-2 { display: grid; grid-template-columns: 1fr 1fr;     gap: 0 14px; }
    @media (max-width: 560px) {
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    /* ── 欄位 ── */
    .field-row { margin-bottom: 10px; }
    .field-row:last-child { margin-bottom: 0; }
    .field-row label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--sub);
      margin-bottom: 4px;
      letter-spacing: .2px;
    }
    .required { color: var(--danger); margin-left: 2px; }

    /* ── 自動帶入欄位 ── */
    .auto-field {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border: 1.5px solid var(--auto-border);
      border-radius: 6px;
      background: var(--auto-bg);
      color: var(--auto-text);
      font-size: 13px;
      font-weight: 600;
      min-height: 34px;
    }
    .auto-field .lock { font-size: 10px; opacity: .6; margin-left: auto; flex-shrink: 0; }
    .auto-field.loading {
      color: var(--sub);
      font-weight: 400;
      background: #f7fafc;
      border-color: var(--border);
    }

    /* ── 一般 input / select / textarea ── */
    .field-row input[type=text],
    .field-row input[type=date],
    .field-row select,
    .field-row textarea {
      width: 100%;
      padding: 7px 10px;
      border: 1.5px solid var(--border);
      border-radius: 6px;
      font-size: 13px;
      font-family: inherit;
      color: var(--text);
      background: #fff;
      transition: border-color .2s;
      outline: none;
    }
    .field-row input:focus,
    .field-row select:focus,
    .field-row textarea:focus { border-color: var(--primary); }

    /* ── 上傳槽 ── */
    .upload-row {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
    }
    @media (max-width: 480px) { .upload-row { grid-template-columns: 1fr; } }
    .upload-slot {
      border: 1.5px dashed #cbd5e0;
      border-radius: 6px;
      padding: 10px;
      text-align: center;
      cursor: pointer;
      transition: background .15s;
    }
    .upload-slot:hover { background: var(--primary-l); }
    .slot-label { font-size: 10px; color: var(--sub); margin-bottom: 3px; }
    .slot-btn   { font-size: 12px; color: var(--primary); font-weight: 700; cursor: pointer; display: block; }
    .slot-note  { font-size: 9px; color: #a0aec0; margin-top: 2px; }
    .file-list  { display: flex; flex-direction: column; gap: 4px; margin-top: 6px; text-align: left; }

    /* ── 審核進度（四欄） ── */
    .stage-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }
    @media (max-width: 520px) { .stage-row { grid-template-columns: 1fr 1fr; } }
    .stage-chip {
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
    }
    .stage-chip .stage-no     { font-size: 10px; color: var(--sub); font-weight: 700; margin-bottom: 2px; }
    .stage-chip .stage-person { font-size: 12px; font-weight: 700; margin-bottom: 4px; }
    .stage-chip .stage-time   { font-size: 10px; color: var(--sub); margin-top: 3px; min-height: 14px; }

    /* ── 送出按鈕 ── */
    .submit-btn {
      width: 100%;
      padding: 11px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: var(--radius);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
      margin-top: 2px;
      transition: background .2s;
    }
    .submit-btn:hover:not(:disabled) { background: var(--primary-d); }
    .submit-btn:disabled { opacity: .6; cursor: not-allowed; }

    /* ── 確認畫面 ── */
    #confirm-section { display: none; }
    .confirm-box { text-align: center; padding: 40px 24px; }
    .confirm-icon  { font-size: 56px; }
    .confirm-title { font-size: 22px; font-weight: 700; color: var(--success); margin-top: 14px; }
    .confirm-sub   { font-size: 14px; color: var(--sub); margin-top: 8px; line-height: 1.6; }
    .confirm-id {
      display: inline-block;
      margin-top: 14px;
      padding: 6px 18px;
      background: var(--primary-l);
      color: var(--primary);
      border-radius: 20px;
      font-size: 13px;
      font-weight: 700;
    }

    /* 隱藏 file input */
    input[type=file] { display: none; }
  </style>
</head>
<body>

<!-- 頂部 Bar -->
<header class="topbar">
  <div class="topbar-title">銘勁汽車</div>
  <div class="topbar-sub">自媒體素材審核申請</div>
  <div class="topbar-spacer"></div>
  <div class="user-badge">👤 <span id="user-display">載入中…</span></div>
</header>

<div class="page-wrap">
  <div id="form-section">

    <!-- ① 申請資訊 -->
    <div class="card">
      <div class="card-title">📋 申請資訊</div>

      <!-- 自動帶入三欄：姓名 / Email / 據點 -->
      <div class="grid-3" style="margin-bottom:12px;">
        <div class="field-row">
          <label>姓名</label>
          <div class="auto-field loading" id="applicant-name-display">載入中… <span class="lock">🔒</span></div>
          <input type="hidden" id="applicant-name" />
        </div>
        <div class="field-row">
          <label>Email</label>
          <div class="auto-field loading" id="applicant-email-display" style="font-size:11px;">載入中… <span class="lock">🔒</span></div>
          <input type="hidden" id="applicant-email" />
        </div>
        <div class="field-row">
          <label>據點 <span class="required">*</span></label>
          <div class="auto-field loading" id="location-display">載入中… <span class="lock">🔒</span></div>
          <select id="location-select" style="display:none;">
            <option value="">請選擇據點</option>
            <option value="銘勁八德所">銘勁八德所</option>
            <option value="銘勁中壢所">銘勁中壢所</option>
            <option value="銘勁桃園所">銘勁桃園所</option>
          </select>
          <input type="hidden" id="location" />
        </div>
      </div>

      <!-- 發布資訊兩欄 -->
      <div class="grid-2" style="margin-bottom:10px;">
        <div class="field-row">
          <label for="platform">發布平台 <span class="required">*</span></label>
          <select id="platform">
            <option value="">請選擇平台</option>
            <option value="Facebook">Facebook</option>
            <option value="Instagram">Instagram</option>
            <option value="LINE">LINE</option>
            <option value="YouTube">YouTube</option>
            <option value="其他">其他</option>
          </select>
        </div>
        <div class="field-row">
          <label for="post-date">預計發布日期 <span class="required">*</span></label>
          <input id="post-date" type="date" />
        </div>
      </div>

      <div class="field-row">
        <label for="post-title">貼文標題 <span class="required">*</span></label>
        <input id="post-title" type="text" placeholder="請填寫貼文標題" maxlength="200" />
      </div>
      <div class="field-row">
        <label for="caption">貼文說明文字</label>
        <textarea id="caption" rows="2" style="resize:none;" placeholder="貼文內容草稿（選填）"></textarea>
      </div>
    </div>

    <!-- ② 媒體素材 -->
    <div class="card">
      <div class="card-title">🖼️ 媒體素材</div>
      <div class="upload-row">
        <div class="upload-slot">
          <div class="slot-label">照片（最多 2 張）</div>
          <label class="slot-btn" for="photo-input">＋ 選擇照片</label>
          <div class="slot-note">JPG / PNG / HEIC</div>
          <div id="photo-list" class="file-list"></div>
        </div>
        <div class="upload-slot">
          <div class="slot-label">短影音（最多 1 支）</div>
          <label class="slot-btn" for="video-input">＋ 選擇影片</label>
          <div class="slot-note">MP4 / MOV，1 分鐘內</div>
          <div id="video-list" class="file-list"></div>
        </div>
        <div class="upload-slot">
          <div class="slot-label">其他附件（最多 3 個）</div>
          <label class="slot-btn" for="attach-input">＋ 選擇附件</label>
          <div class="slot-note">PDF / Word / Excel</div>
          <div id="attach-list" class="file-list"></div>
        </div>
      </div>
      <input id="photo-input"  type="file" accept=".jpg,.jpeg,.png,.gif,.webp,.heic,.heif" multiple />
      <input id="video-input"  type="file" accept=".mp4,.mov,.avi,.mkv,.webm" />
      <input id="attach-input" type="file" accept=".pdf,.docx,.xlsx,.pptx,.zip,.txt" multiple />
    </div>

    <!-- ③ 審核進度（四欄） -->
    <div class="card">
      <div class="card-title">👥 審核進度 <span class="note">系統依據點自動帶入</span></div>
      <div class="stage-row">
        <div class="stage-chip">
          <div class="stage-no">第一關 — 申請人</div>
          <div class="stage-person" id="stage1-person">—</div>
          <div class="stage-time"   id="stage1-time" style="color:#a0aec0;">尚未送出</div>
        </div>
        <div class="stage-chip">
          <div class="stage-no">第二關 — 所長</div>
          <div class="stage-person" id="reviewer2-name">—</div>
          <div class="stage-time"   id="reviewer2-time" style="color:#a0aec0;">尚未審核</div>
        </div>
        <div class="stage-chip">
          <div class="stage-no">第三關 — 行銷</div>
          <div class="stage-person" id="reviewer3-name">—</div>
          <div class="stage-time"   id="reviewer3-time" style="color:#a0aec0;">尚未審核</div>
        </div>
        <div class="stage-chip">
          <div class="stage-no">第四關 — 部長</div>
          <div class="stage-person" id="reviewer4-name">—</div>
          <div class="stage-time"   id="reviewer4-time" style="color:#a0aec0;">尚未審核</div>
        </div>
      </div>
      <!-- 隱藏欄位：供 form.js 讀取 -->
      <input type="hidden" id="reviewer2-name-val" />
      <input type="hidden" id="reviewer2-email-val" />
      <input type="hidden" id="reviewer3-name-val" />
      <input type="hidden" id="reviewer3-email-val" />
      <input type="hidden" id="reviewer4-name-val" />
      <input type="hidden" id="reviewer4-email-val" />
    </div>

    <!-- 送出 -->
    <button id="submit-btn" class="submit-btn">送出申請</button>

  </div><!-- /#form-section -->

  <!-- 確認畫面 -->
  <div id="confirm-section">
    <div class="card">
      <div class="confirm-box">
        <div class="confirm-icon">🎉</div>
        <div class="confirm-title">申請已送出！</div>
        <div class="confirm-sub">
          表單已成功提交，審核人員將收到通知。<br />
          您可以在下方追蹤審核進度。
        </div>
        <div class="confirm-id">申請編號 <span id="confirm-item-id">—</span></div>
      </div>
      <div class="card-title" style="margin-top:8px;">審核進度</div>
      <div id="confirm-tracker"></div>
    </div>
  </div>

</div><!-- /.page-wrap -->

<!-- form.js（ES module） -->
<script type="module" src="form.js?v=4"></script>

<!-- topbar 使用者名稱 -->
<script type="module">
  import { getCurrentUser } from '../shared/auth.js?v=4';
  const update = () => {
    const u = getCurrentUser();
    if (u) document.getElementById('user-display').textContent = u.name;
    else setTimeout(update, 500);
  };
  update();
</script>

</body>
</html>
